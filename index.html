<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Afrique Shop</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body { margin:0; font-family:'Poppins'; background:#f4f6f9; }

/* HEADER */
header {
 display:flex; justify-content:space-between; align-items:center;
 background:#0a1f44; color:white; padding:15px;
}
.logo { font-size:22px; color:#ff8800; font-weight:bold; }

/* HERO */
.hero {
 background:linear-gradient(120deg,#ff6a00,#ee0979);
 color:white; text-align:center; padding:50px;
}

/* PRODUCTS */
.products {
 display:grid;
 grid-template-columns:repeat(auto-fit,minmax(230px,1fr));
 gap:20px; padding:20px;
}

.card {
 background:white; padding:15px; border-radius:15px;
 text-align:center; box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.card img {
 width:100%; height:180px; object-fit:cover;
 border-radius:10px;
}

.price { color:green; font-weight:bold; }

/* BUTTON */
.btn {
 display:block; margin-top:10px;
 padding:10px; border:none; border-radius:5px;
 color:white; cursor:pointer;
}
.add { background:#0a1f44; }
.whatsapp { background:#25D366; }
.orange { background:#ff8800; }

/* CART */
.cart {
 position:fixed; top:0; right:-100%;
 width:300px; height:100%;
 background:white; box-shadow:-5px 0 10px rgba(0,0,0,0.2);
 padding:20px; transition:0.3s;
}

.cart.active { right:0; }

footer {
 background:#0a1f44; color:white;
 text-align:center; padding:20px;
}
</style>

<script>
let panier = [];

function ajouter(nom, prix){
 panier.push({nom, prix});
 alert(nom + " ajouté au panier");
 afficherPanier();
}

function afficherPanier(){
 let cart = document.getElementById("cart-items");
 cart.innerHTML="";
 let total=0;

 panier.forEach(p=>{
  cart.innerHTML += `<p>${p.nom} - ${p.prix} FCFA</p>`;
  total += p.prix;
 });

 document.getElementById("total").innerText = total + " FCFA";
}

function ouvrirPanier(){
 document.getElementById("cart").classList.add("active");
}

function fermerPanier(){
 document.getElementById("cart").classList.remove("active");
}

function payer(){
 alert("Paiement réel à connecter avec PayDunya ou Stripe");
}
</script>

</head>

<body>

<header>
<div class="logo">Afrique Shop</div>
<button onclick="ouvrirPanier()">🛒</button>
</header>

<section class="hero">
<h1>🔥 Boutique tendance au Mali</h1>
<p>Livraison rapide + paiement Mobile Money</p>
</section>

<section class="products">

<div class="card">
<img src="https://images.unsplash.com/photo-1585386959984-a4155224a1ad">
<h3>Écouteurs Bluetooth</h3>
<p class="price">7500 FCFA</p>
<button class="btn add" onclick="ajouter('Écouteurs',7500)">Ajouter</button>
<button class="btn whatsapp" onclick="window.open('https://wa.me/22379599968')">WhatsApp</button>
<button class="btn orange">Orange</button>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1580910051074-3eb694886505">
<h3>Power Bank</h3>
<p class="price">8000 FCFA</p>
<button class="btn add" onclick="ajouter('Power Bank',8000)">Ajouter</button>
<button class="btn whatsapp" onclick="window.open('https://wa.me/22379599968')">WhatsApp</button>
<button class="btn orange">Orange</button>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1518441902110-0d0c7c1a3c06">
<h3>Montre connectée</h3>
<p class="price">12000 FCFA</p>
<button class="btn add" onclick="ajouter('Montre',12000)">Ajouter</button>
<button class="btn whatsapp" onclick="window.open('https://wa.me/22379599968')">WhatsApp</button>
<button class="btn orange">Orange</button>
</div>

</section>

<!-- PANIER -->
<div id="cart" class="cart">
<h2>Panier</h2>
<div id="cart-items"></div>
<p>Total : <span id="total">0 FCFA</span></p>
<button onclick="payer()" class="btn add">Payer</button>
<button onclick="fermerPanier()" class="btn orange">Fermer</button>
</div>

<footer>
<p>📧 mkatech68@gmail.com</p>
<p>📱 +223 79599968</p>
</footer>

</body>
</html>
